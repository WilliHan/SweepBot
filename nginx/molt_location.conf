# SweepBot (OpenClaw) Nginx 위치 블록 — mss_https.conf 에 삽입
#
# 전제:
#   - openclaw gateway.controlUi.basePath = "/molt" 설정 완료
#   - gateway bind = loopback (127.0.0.1:3000)
#   - auth.mode = trusted-proxy
#
# 사용법:
#   기존 server {} 블록 안의 적절한 위치에 아래 두 location 블록을 추가한다.

location = /molt {
    return 301 /molt/;
}

location /molt/ {
    # proxy_pass 끝에 / 없음 → /molt/foo 가 그대로 127.0.0.1:3000/molt/foo 로 전달
    # controlUi.basePath=/molt 이므로 OpenClaw가 직접 /molt/ 경로에서 서빙
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-User "openclaw-user";
    proxy_read_timeout 300;
    proxy_connect_timeout 30;
    proxy_send_timeout 120;
}
